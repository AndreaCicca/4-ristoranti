<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettagli Location</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
    }

    .container-fluid {
        max-width: 80%;
        margin: 0 auto;
        background: #fff;
        /* box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); */
    }
</style>
<body class="bg-light">
    <div class="container-fluid py-4">
        <h1 class="mb-4">Dettagli di <span id="locationName"></span></h1>
        
        <div id="info" class="row"></div>
    </div>
    <div class="container-fluid py-4">
        <button class="btn btn-primary" onclick="window.history.back();" type="button">Torna Indietro</button>
    </div>

    <script>
        const loc = new URLSearchParams(window.location.search).get('loc');
        document.getElementById('locationName').textContent = loc;

        fetch('4ristoranti.json')
            .then(r => r.json())
            .then(data => {
                const filtered = data.filter(item => item.Location === loc);
                document.getElementById('info').innerHTML = filtered.map(item => `
                    <div class="col-12 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">${item.Location} - Puntata ${item.Puntata}</h5>
                                <p class="card-text">
                                    <strong>Tema:</strong> ${item.Tema}<br>
                                    <strong>Anno:</strong> ${item.Anno} | <strong>Stagione:</strong> ${item.Stagione}<br>
                                    <strong>Prima Visione:</strong> ${item["Prima_visione"]}<br>
                                    <strong>Categoria Speciale:</strong> ${item["Categoria speciale"] || 'N/A'}<br>
                                    <strong>Concorrenti:</strong> ${item.Concorrenti}<br>
                                    <strong>Vincitore:</strong> ${item.Vincitore}<br>
                                    <strong>Titolare:</strong> ${item.Titolare}
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
