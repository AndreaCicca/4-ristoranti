<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programma Televisivo con Mappa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #map {
            width: 100%;
            height: 600px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>4 Ristoranti - Mappa delle Location</h1>
        <div id="map"></div>
    </div>

    <script>
        // Carica i dati dal file JSON con coordinate
        fetch('Programma_Televisivo_con_Stagioni_with_coordinates.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Errore nel caricamento del file JSON.");
                }
                return response.json();
            })
            .then(data => {
                // Inizializza la mappa centrata sull'Italia
                const map = L.map('map').setView([41.8719, 12.5674], 6);
    
                // Aggiungi il layer delle mappe
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);
    
                // Aggiungi marker per ogni location
                data.forEach(item => {
                    const {
                        Anno, Stagione, Puntata, Location, Tema, "Prima_visione": PrimaVisione,
                        "Categoria speciale": CategoriaSpeciale, Concorrenti, Vincitore, Titolare, Latitude, Longitude
                    } = item;
    
                    if (Latitude && Longitude) {
                        // Suddividi i concorrenti in link
                        const concorrentiLinks = Concorrenti.split(',').map(concorrente => {
                            const query = `${concorrente.trim()} ${Location}`.replace(/\s+/g, '+');
                            return `<a href="https://www.google.com/search?q=${query}" target="_blank">${concorrente.trim()}</a>`;
                        }).join(', ');
    
                        // Contenuto del popup
                        const popupContent = `
                            <div style="font-family: Arial, sans-serif; font-size: 14px;">
                                <h4 style="margin: 0; color: #333;">${Location}</h4>
                                <p style="margin: 5px 0; color: #555;"><strong>Tema:</strong> ${Tema}</p>
                                <p style="margin: 5px 0;"><strong>Anno:</strong> ${Anno} | <strong>Stagione:</strong> ${Stagione} | <strong>Puntata:</strong> ${Puntata}</p>
                                <p style="margin: 5px 0;"><strong>Prima Visione:</strong> ${PrimaVisione}</p>
                                <p style="margin: 5px 0;"><strong>Categoria Speciale:</strong> ${CategoriaSpeciale || 'N/A'}</p>
                                <p style="margin: 5px 0;"><strong>Concorrenti:</strong> ${concorrentiLinks}</p>
                                <p style="margin: 5px 0;"><strong>Vincitore:</strong> ${Vincitore}</p>
                                <p style="margin: 5px 0;"><strong>Titolare:</strong> ${Titolare}</p>
                            </div>
                            <p><a href="location.html?loc=${Location}" target="_blank">Dettagli su ${Location}</a></p>
                        `;
                        
    
                        // Aggiungi marker e popup alla mappa
                        L.marker([Latitude, Longitude])
                            .addTo(map)
                            .bindPopup(popupContent);
                    }
                });
            })
            .catch(error => {
                console.error(error);
                alert("Impossibile caricare i dati della mappa.");
            });
    </script>
    
    
</body>

</html>
