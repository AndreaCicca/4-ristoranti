<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programma Televisivo con Mappa</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container-fluid {
            max-width: 80%;
            margin: 0 auto;
            background: #fff;
            /* padding: 20px; */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #map {
            width: 100%;
            height: 600px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid py-4">
        <h1>4 Ristoranti - Mappa delle Location</h1>

        <!-- Tabs -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tabella-tab" data-bs-toggle="tab" data-bs-target="#tabella"
                    type="button" role="tab">Tabella</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="mappa-tab" data-bs-toggle="tab" data-bs-target="#mappa" type="button"
                    role="tab">Mappa</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- Tabella -->
            <div class="tab-pane fade show active" id="tabella" role="tabpanel" aria-labelledby="tabella-tab">
                <div class="mt-3">
                    <label for="filtro-stagione" class="form-label">Filtra per Stagione:</label>
                    <select id="filtro-stagione" class="form-select">
                        <option value="">Tutte</option>
                    </select>
                </div>
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Anno</th>
                            <th>Stagione</th>
                            <th>Puntata</th>
                            <th>Location</th>
                            <th>Tema</th>
                            <th>Prima Visione</th>
                            <th>Categoria Speciale</th>
                            <th>Concorrenti</th>
                            <th>Vincitore</th>
                            <th>Titolare</th>
                        </tr>
                    </thead>
                    <tbody id="tabella-dati">
                        <!-- Dati caricati dinamicamente -->
                    </tbody>
                </table>
            </div>

            <!-- Mappa -->
            <div class="tab-pane fade" id="mappa" role="tabpanel" aria-labelledby="mappa-tab">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script>
        // Carica i dati dal file JSON
        fetch('4ristoranti.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Errore nel caricamento del file JSON.");
                }
                return response.json();
            })
            .then(data => {
                // Popola il filtro per stagioni
                const filtroStagione = document.getElementById('filtro-stagione');
                const stagioni = [...new Set(data.map(item => item.Stagione))];
                stagioni.forEach(stagione => {
                    const option = document.createElement('option');
                    option.value = stagione;
                    option.textContent = `${stagione}° Stagione`;
                    filtroStagione.appendChild(option);
                });

                // Funzione per aggiornare la tabella
                const aggiornaTabella = (stagioneFiltro) => {
                    const tabellaDati = document.getElementById('tabella-dati');
                    tabellaDati.innerHTML = '';

                    const datiFiltrati = stagioneFiltro ? data.filter(item => item.Stagione === stagioneFiltro) : data;
                    datiFiltrati.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${item.Anno}</td>
                            <td>${item.Stagione}</td>
                            <td>${item.Puntata}</td>
                            <td>${item.Location}</td>
                            <td>${item.Tema}</td>
                            <td>${item.Prima_visione || 'N/A'}</td>
                            <td>${item["Categoria speciale"] || 'Non ancora aggiunta'}</td>
                            <td>${item.Concorrenti || 'N/A'}</td>
                            <td>${item.Vincitore || 'N/A'}</td>
                            <td>${item.Titolare || 'N/A'}</td>
                        `;
                        tabellaDati.appendChild(row);
                    });
                };

                // Aggiorna tabella al caricamento iniziale
                aggiornaTabella();

                // Event listener per il filtro
                filtroStagione.addEventListener('change', () => {
                    aggiornaTabella(filtroStagione.value);
                });

                // Logica mappa originale
                const map = L.map('map').setView([41.8719, 12.5674], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);

                data.forEach(item => {
                    const {
                        Anno, Stagione, Puntata, Location, Tema, "Prima_visione": PrimaVisione,
                        "Categoria speciale": CategoriaSpeciale, Concorrenti, Vincitore, Titolare, Latitude, Longitude
                    } = item;

                    if (Latitude && Longitude) {
                        const concorrentiLinks = Concorrenti.split(',').map(concorrente => {
                            const query = `${concorrente.trim()} ${Location}`.replace(/\s+/g, '+');
                            return `<a href="https://www.google.com/search?q=${query}" target="_blank">${concorrente.trim()}</a>`;
                        }).join(', ');

                        const popupContent = `
                            <div style="font-family: Arial, sans-serif; font-size: 14px;">
                                <h4 style="margin: 0; color: #333;">${Location}</h4>
                                <p style="margin: 5px 0; color: #555;"><strong>Tema:</strong> ${Tema}</p>
                                <p style="margin: 5px 0;"><strong>Anno:</strong> ${Anno} | <strong>Stagione:</strong> ${Stagione} | <strong>Puntata:</strong> ${Puntata}</p>
                                <p style="margin: 5px 0;"><strong>Prima Visione:</strong> ${PrimaVisione}</p>
                                <p style="margin: 5px 0;"><strong>Categoria Speciale:</strong> ${CategoriaSpeciale || 'N/A'}</p>
                                <p style="margin: 5px 0;"><strong>Concorrenti:</strong> ${concorrentiLinks}</p>
                                <p style="margin: 5px 0;"><strong>Vincitore:</strong> ${Vincitore}</p>
                                <p style="margin: 5px 0;"><strong>Titolare:</strong> ${Titolare}</p>
                            </div>
                            <p><a href="location.html?loc=${Location}" target="_blank">Dettagli su ${Location}</a></p>
                        `;

                        L.marker([Latitude, Longitude])
                            .addTo(map)
                            .bindPopup(popupContent);
                    }
                });

                // Aggiorna layout della mappa quando la tab "Mappa" è attivata
                const mappaTab = document.getElementById('mappa-tab');
                mappaTab.addEventListener('shown.bs.tab', () => {
                    map.invalidateSize();
                });
            })
            .catch(error => {
                console.error(error);
                alert("Impossibile caricare i dati.");
            });
    </script>
</body>

</html>
